<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  .container {
    width: 100%;
    max-width: 720px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
    color: #fff;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 2rem;
  }

  .input-group {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  input[type="text"] {
    flex: 1;
    padding: 0.75rem 1rem;
    border: 1px solid #333;
    border-radius: 8px;
    background: #141414;
    color: #e0e0e0;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: #555;
  }

  button {
    padding: 0.75rem 1.25rem;
    border: none;
    border-radius: 8px;
    background: #fff;
    color: #000;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    font-size: 0.8rem;
    color: #555;
  }

  .stats span { color: #888; }

  /* Answer section */
  .answer-box {
    background: #141414;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 1rem;
    display: none;
    line-height: 1.65;
    font-size: 0.92rem;
  }

  .answer-box.visible { display: block; }

  .answer-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #555;
    margin-bottom: 0.6rem;
  }

  .answer-text {
    white-space: pre-wrap;
  }

  /* Sources */
  .sources {
    display: none;
    margin-bottom: 2rem;
  }

  .sources.visible { display: block; }

  .sources-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #555;
    margin-bottom: 0.5rem;
  }

  .source-chip {
    display: inline-block;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 0.35rem 0.65rem;
    margin: 0.2rem;
    font-size: 0.78rem;
    color: #888;
    cursor: default;
  }

  .source-chip .sim {
    color: #555;
    margin-left: 0.3rem;
  }

  /* Loading */
  .loading {
    display: none;
    color: #555;
    font-size: 0.85rem;
    padding: 1rem 0;
  }

  .loading.visible { display: block; }

  .loading::after {
    content: '';
    animation: dots 1.5s infinite;
  }

  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
  }
</style>
</head>
<body>
  <div class="container">
    <h1>RAG</h1>
    <p class="subtitle">Ask questions about your documents</p>

    <div class="stats" id="stats"></div>

    <div class="input-group">
      <input type="text" id="question" placeholder="Ask a question..." autofocus>
      <button id="ask" onclick="askQuestion()">Ask</button>
    </div>

    <div class="loading" id="loading">Searching and generating</div>

    <div class="answer-box" id="answerBox">
      <div class="answer-label">Answer</div>
      <div class="answer-text" id="answerText"></div>
    </div>

    <div class="sources" id="sourcesBox">
      <div class="sources-label">Sources</div>
      <div id="sourcesList"></div>
    </div>
  </div>

<script>
  const questionInput = document.getElementById('question');
  const askBtn = document.getElementById('ask');
  const loading = document.getElementById('loading');
  const answerBox = document.getElementById('answerBox');
  const answerText = document.getElementById('answerText');
  const sourcesBox = document.getElementById('sourcesBox');
  const sourcesList = document.getElementById('sourcesList');

  // Enter key submits
  questionInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') askQuestion();
  });

  // Load stats on page load
  async function loadStats() {
    try {
      const res = await fetch('/stats');
      const data = await res.json();
      document.getElementById('stats').innerHTML =
        `<div>Files: <span>${data.files}</span></div>` +
        `<div>Chunks: <span>${data.chunks}</span></div>` +
        `<div>Queries: <span>${data.queries_logged}</span></div>`;
    } catch (e) {}
  }
  loadStats();

  async function askQuestion() {
    const q = questionInput.value.trim();
    if (!q) return;

    // UI state: loading
    askBtn.disabled = true;
    loading.classList.add('visible');
    answerBox.classList.remove('visible');
    sourcesBox.classList.remove('visible');

    try {
      const res = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();

      // Show answer
      answerText.textContent = data.answer;
      answerBox.classList.add('visible');

      // Show sources
      if (data.sources && data.sources.length > 0) {
        sourcesList.innerHTML = data.sources.map(s =>
          `<span class="source-chip">${s.filename} p.${s.page}<span class="sim">${s.similarity}</span></span>`
        ).join('');
        sourcesBox.classList.add('visible');
      }

      loadStats();
    } catch (err) {
      answerText.textContent = `Error: ${err.message}`;
      answerBox.classList.add('visible');
    } finally {
      askBtn.disabled = false;
      loading.classList.remove('visible');
    }
  }
</script>
</body>
</html>
